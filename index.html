<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线性代数计算器</title>
    
    <!-- 网站图标 -->
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <!-- 主题初始化（防止闪烁） -->
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    
    <!-- 外部依赖 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 访问量统计 (busuanzi) -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <!-- 本地CSS -->
    <link href="css/styles.css" rel="stylesheet">
    
    <!-- Tailwind配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        secondary: '#6b7280',
                        accent: '#f97316',
                        dark: '#111827',
                        light: '#f9fafb'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Consolas', 'Monaco', 'monospace']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <div class="container mx-auto px-4 py-8">
        <!-- 标题区域 -->
        <header class="mb-8 relative">
            <div class="text-center">
                <h1 class="text-4xl font-bold text-gray-800 dark:text-gray-100 mb-2">线性代数计算器</h1>
            </div>
            <!-- 主题切换按钮 -->
            <button id="theme-toggle" type="button"
               class="absolute top-1 right-10 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors duration-200 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700"
               title="切换主题" aria-label="切换深色/浅色主题">
                <!-- 太阳图标（浅色模式显示） -->
                <svg class="dark:hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- 月亮图标（深色模式显示） -->
                <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <a href="https://github.com/lyrumu" target="_blank" rel="noopener noreferrer"
               class="absolute top-1 right-0 text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors duration-200 p-1"
               title="GitHub" aria-label="访问我的 GitHub 主页">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
        </header>

        <!-- 导航栏 -->
        <nav class="bg-white dark:bg-gray-800 rounded-xl shadow-md dark:shadow-gray-900/50 mb-8 overflow-x-auto">
            <ul class="flex space-x-1 p-1.5" id="nav-tabs">
                <li><button class="nav-item active" data-tab="determinant">行列式</button></li>
                <li><button class="nav-item" data-tab="matrix">矩阵运算</button></li>
                <li><button class="nav-item" data-tab="vector">向量运算</button></li>
                <li><button class="nav-item" data-tab="linear-system">线性方程组</button></li>
                <li><button class="nav-item" data-tab="vector-group">向量组</button></li>
                <li><button class="nav-item" data-tab="quadratic-form">二次型</button></li>
                <li><button class="nav-item" data-tab="history">历史记录</button></li>
            </ul>
        </nav>

        <!-- 主内容区域 -->
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- 左侧输入面板 -->
            <div class="w-full lg:w-1/2">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md dark:shadow-gray-900/50 p-6">
                    
                    <!-- 行列式计算 -->
                    <div id="determinant-tab" class="tab-content">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-th text-primary"></i>
                            行列式计算
                        </h2>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">矩阵维度</label>
                            <div class="flex items-center gap-4">
                                <div>
                                    <label for="det-rows" class="block text-sm text-gray-500 mb-1">行数</label>
                                    <input type="number" id="det-rows" min="1" max="10" value="3" class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <span class="text-gray-400 text-xl mt-5">×</span>
                                <div>
                                    <label for="det-cols" class="block text-sm text-gray-500 mb-1">列数</label>
                                    <input type="number" id="det-cols" min="1" max="10" value="3" class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="det-resize" class="btn-primary mt-5">生成</button>
                            </div>
                        </div>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">矩阵元素</label>
                            <div id="det-matrix-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        <div class="flex gap-3">
                            <button id="det-calculate" class="btn-primary flex-1 py-3 text-lg">
                                <i class="fa fa-calculator mr-2"></i>计算行列式
                            </button>
                            <button id="det-clear" class="btn-secondary px-6 py-3">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 矩阵运算 -->
                    <div id="matrix-tab" class="tab-content hidden">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-th-large text-primary"></i>
                            矩阵运算
                        </h2>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">运算类型</label>
                            <select id="matrix-operation" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
                                <option value="add">矩阵加法 (A + B)</option>
                                <option value="subtract">矩阵减法 (A − B)</option>
                                <option value="multiply">矩阵乘法 (A × B)</option>
                                <option value="scalar-multiply">数乘矩阵 (k × A)</option>
                                <option value="transpose">矩阵转置 (Aᵀ)</option>
                                <option value="inverse">矩阵求逆 (A⁻¹)</option>
                                <option value="adjugate">伴随矩阵 (adj(A))</option>
                                <option value="rank">矩阵的秩 (rank(A))</option>
                                <option value="trace">矩阵的迹 (tr(A))</option>
                                <option value="eigen">特征值和特征向量</option>
                            </select>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">矩阵 A</label>
                            <div class="flex items-center gap-4 mb-3">
                                <div>
                                    <label for="mat-a-rows" class="block text-sm text-gray-500 mb-1">行数</label>
                                    <input type="number" id="mat-a-rows" min="1" max="10" value="2" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <span class="text-gray-400 text-xl mt-5">×</span>
                                <div>
                                    <label for="mat-a-cols" class="block text-sm text-gray-500 mb-1">列数</label>
                                    <input type="number" id="mat-a-cols" min="1" max="10" value="2" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="mat-a-resize" class="btn-primary mt-5">生成</button>
                            </div>
                            <div id="mat-a-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        
                        <div id="matrix-b-section" class="tab-section hidden">
                            <label class="block text-gray-700 mb-3 font-medium">矩阵 B</label>
                            <div class="flex items-center gap-4 mb-3">
                                <div>
                                    <label for="mat-b-rows" class="block text-sm text-gray-500 mb-1">行数</label>
                                    <input type="number" id="mat-b-rows" min="1" max="10" value="2" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <span class="text-gray-400 text-xl mt-5">×</span>
                                <div>
                                    <label for="mat-b-cols" class="block text-sm text-gray-500 mb-1">列数</label>
                                    <input type="number" id="mat-b-cols" min="1" max="10" value="2" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="mat-b-resize" class="btn-primary mt-5">生成</button>
                            </div>
                            <div id="mat-b-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        
                        <div id="scalar-section" class="tab-section hidden">
                            <label for="scalar-value" class="block text-gray-700 mb-3 font-medium">标量值 k</label>
                            <input type="number" id="scalar-value" step="any" value="2" class="w-40 px-4 py-3 border border-gray-300 rounded-lg font-mono text-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div class="flex gap-3">
                            <button id="matrix-calculate" class="btn-primary flex-1 py-3 text-lg">
                                <i class="fa fa-calculator mr-2"></i>计算
                            </button>
                            <button id="matrix-clear" class="btn-secondary px-6 py-3">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 向量运算 -->
                    <div id="vector-tab" class="tab-content hidden">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-arrows text-primary"></i>
                            向量运算
                        </h2>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">运算类型</label>
                            <select id="vector-operation" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
                                <option value="add">向量加法 (u + v)</option>
                                <option value="subtract">向量减法 (u − v)</option>
                                <option value="scalar-multiply">数乘向量 (k × u)</option>
                                <option value="dot-product">点积 (u · v)</option>
                                <option value="cross-product">叉积 (u × v)</option>
                                <option value="length">向量长度 (‖u‖)</option>
                                <option value="angle">向量夹角 (θ)</option>
                                <option value="orthogonality">正交性检验</option>
                            </select>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">向量 u</label>
                            <div class="flex items-center gap-4 mb-3">
                                <div>
                                    <label for="vec-u-length" class="block text-sm text-gray-500 mb-1">维度</label>
                                    <input type="number" id="vec-u-length" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="vec-u-resize" class="btn-primary mt-5">生成</button>
                            </div>
                            <div id="vec-u-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        
                        <div id="vector-v-section" class="tab-section hidden">
                            <label class="block text-gray-700 mb-3 font-medium">向量 v</label>
                            <div class="flex items-center gap-4 mb-3">
                                <div>
                                    <label for="vec-v-length" class="block text-sm text-gray-500 mb-1">维度</label>
                                    <input type="number" id="vec-v-length" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="vec-v-resize" class="btn-primary mt-5">生成</button>
                            </div>
                            <div id="vec-v-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        
                        <div id="vec-scalar-section" class="tab-section hidden">
                            <label for="vec-scalar-value" class="block text-gray-700 mb-3 font-medium">标量值 k</label>
                            <input type="number" id="vec-scalar-value" step="any" value="2" class="w-40 px-4 py-3 border border-gray-300 rounded-lg font-mono text-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div class="flex gap-3">
                            <button id="vector-calculate" class="btn-primary flex-1 py-3 text-lg">
                                <i class="fa fa-calculator mr-2"></i>计算
                            </button>
                            <button id="vector-clear" class="btn-secondary px-6 py-3">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 线性方程组 -->
                    <div id="linear-system-tab" class="tab-content hidden">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-superscript text-primary"></i>
                            线性方程组求解
                        </h2>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">求解方法</label>
                            <select id="system-method" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
                                <option value="gauss">高斯消元法</option>
                                <option value="lu">LU分解法</option>
                                <option value="basis-solution">基础解系</option>
                                <option value="general-solution">通解</option>
                            </select>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">方程组维度</label>
                            <div class="flex items-center gap-4">
                                <div>
                                    <label for="sys-equations" class="block text-sm text-gray-500 mb-1">方程数</label>
                                    <input type="number" id="sys-equations" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <span class="text-gray-400 text-xl mt-5">×</span>
                                <div>
                                    <label for="sys-variables" class="block text-sm text-gray-500 mb-1">变量数</label>
                                    <input type="number" id="sys-variables" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="sys-resize" class="btn-primary mt-5">生成</button>
                            </div>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">系数矩阵</label>
                            <div id="sys-coefficients-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">常数项向量 b</label>
                            <div id="sys-constants-container" class="flex justify-center overflow-x-auto py-2"></div>
                        </div>
                        
                        <div class="flex gap-3">
                            <button id="system-calculate" class="btn-primary flex-1 py-3 text-lg">
                                <i class="fa fa-calculator mr-2"></i>求解
                            </button>
                            <button id="system-clear" class="btn-secondary px-6 py-3">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 向量组 -->
                    <div id="vector-group-tab" class="tab-content hidden">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-share-alt text-primary"></i>
                            向量组分析
                        </h2>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">分析类型</label>
                            <select id="vector-group-operation" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
                                <option value="linear-dependency">线性相关性判断</option>
                                <option value="max-independent">极大无关组</option>
                                <option value="rank">向量组的秩</option>
                                <option value="schmidt">施密特正交化</option>
                            </select>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">向量组设置</label>
                            <div class="flex items-center gap-4">
                                <div>
                                    <label for="vg-vectors" class="block text-sm text-gray-500 mb-1">向量个数</label>
                                    <input type="number" id="vg-vectors" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <span class="text-gray-400 text-xl mt-5">×</span>
                                <div>
                                    <label for="vg-dimension" class="block text-sm text-gray-500 mb-1">向量维度</label>
                                    <input type="number" id="vg-dimension" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="vg-resize" class="btn-primary mt-5">生成</button>
                            </div>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">向量组</label>
                            <div id="vector-group-container" class="space-y-2"></div>
                        </div>
                        
                        <div class="flex gap-3">
                            <button id="vector-group-calculate" class="btn-primary flex-1 py-3 text-lg">
                                <i class="fa fa-calculator mr-2"></i>分析
                            </button>
                            <button id="vector-group-clear" class="btn-secondary px-6 py-3">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 二次型 -->
                    <div id="quadratic-form-tab" class="tab-content hidden">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-line-chart text-primary"></i>
                            二次型分析
                        </h2>
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">分析类型</label>
                            <select id="quadratic-operation" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent bg-white">
                                <option value="standard-form">标准形（正交变换法）</option>
                                <option value="canonical-form">规范形</option>
                                <option value="positive-definite">正定性判断</option>
                            </select>
                        </div>
                        
                        <div class="tab-section">
                            <label class="block text-gray-700 mb-3 font-medium">二次型矩阵</label>
                            <div class="flex items-center gap-4 mb-3">
                                <div>
                                    <label for="qf-dimension" class="block text-sm text-gray-500 mb-1">维度</label>
                                    <input type="number" id="qf-dimension" min="1" max="10" value="3" class="w-16 px-2 py-2 border border-gray-300 rounded-lg text-center font-mono focus:ring-2 focus:ring-primary focus:border-transparent">
                                </div>
                                <button id="qf-resize" class="btn-primary mt-5">生成</button>
                            </div>
                            <div id="qf-matrix-container" class="flex justify-center overflow-x-auto py-2"></div>
                            <p class="text-sm text-gray-400 mt-2">
                                <i class="fa fa-info-circle mr-1"></i>请输入对称矩阵，非对角线元素会自动对称化
                            </p>
                        </div>
                        
                        <div class="flex gap-3">
                            <button id="quadratic-calculate" class="btn-primary flex-1 py-3 text-lg">
                                <i class="fa fa-calculator mr-2"></i>分析
                            </button>
                            <button id="quadratic-clear" class="btn-secondary px-6 py-3">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 历史记录 -->
                    <div id="history-tab" class="tab-content hidden">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-6 flex items-center gap-2">
                            <i class="fa fa-history text-primary"></i>
                            历史记录
                        </h2>
                        <div class="flex justify-between items-center mb-4">
                            <p class="text-sm text-gray-500 dark:text-gray-400">点击记录可快速加载</p>
                            <button id="clear-history" class="btn-secondary text-sm px-4 py-2">
                                <i class="fa fa-trash-o mr-1"></i>清空
                            </button>
                        </div>
                        <div id="history-list" class="max-h-[500px] overflow-y-auto pr-1">
                            <!-- 历史记录动态生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧结果面板 -->
            <div class="w-full lg:w-1/2">
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md dark:shadow-gray-900/50 p-6 sticky top-6">
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-100 mb-4 flex items-center gap-2">
                        <i class="fa fa-check-circle text-primary"></i>
                        计算结果
                    </h2>
                    <div id="result-container" class="min-h-[200px]">
                        <div class="flex flex-col items-center justify-center h-48 text-gray-400 dark:text-gray-500">
                            <i class="fa fa-calculator text-5xl mb-4 opacity-30"></i>
                            <p class="text-lg dark:text-gray-400">请在左侧输入数据并点击计算按钮</p>
                            <p class="text-sm mt-1 opacity-60 dark:text-gray-500">支持分数输入，如 1/2, 3_1/2（带分数）</p>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-lg font-semibold text-gray-700 dark:text-gray-300 flex items-center gap-2">
                                <i class="fa fa-list-ol text-primary"></i>
                                计算过程
                            </h3>
                            <button id="toggle-steps" class="text-primary hover:text-blue-700 dark:hover:text-blue-400 text-sm flex items-center font-medium transition-colors">
                                <span>显示步骤</span>
                                <i class="fa fa-chevron-down ml-1"></i>
                            </button>
                        </div>
                        <div id="steps-container" class="hidden max-h-[400px] overflow-y-auto pr-2">
                            <!-- 计算步骤动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-gray-800 dark:bg-gray-950 text-gray-300 py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-lg font-medium">线性代数计算器</p>
            <div class="mt-3 text-xs text-gray-600 dark:text-gray-500">
                <span id="busuanzi_container_site_pv">本站总访问量 <span id="busuanzi_value_site_pv"></span> 次</span>
                <span class="mx-2">·</span>
                <span id="busuanzi_container_site_uv">访客数 <span id="busuanzi_value_site_uv"></span> 人</span>
            </div>
        </div>
    </footer>

    <!-- 主题切换逻辑 -->
    <script>
        (function() {
            const toggle = document.getElementById('theme-toggle');
            if (!toggle) return;
            
            toggle.addEventListener('click', function() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        })();
    </script>

    <!-- JavaScript文件（按依赖顺序加载）-->
    <script src="js/fraction.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/math-core.js"></script>
    <script src="js/ui-handlers.js"></script>
    <script src="js/tab-handlers.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
